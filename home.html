<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终端接入控制台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: sans-serif; }
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <div class="text-xl font-mono font-bold tracking-widest text-blue-500">SYSTEM_CORE</div>
        <div class="space-x-6 text-sm text-slate-500">
            <span>NETWORK: ONLINE</span>
            <span>ENCRYPTION: AES-256</span>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4">
        <div class="max-w-3xl w-full text-center">
            <h1 class="text-4xl font-bold mb-4">远程接入网关</h1>
            <p class="text-slate-400 mb-8">输入远程资源标识符以建立安全隧道</p>
            
            <div class="relative max-w-xl mx-auto mb-12">
                <input type="text" id="targetInput" 
                       placeholder="Enter resource ID..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg px-6 py-4 focus:outline-none focus:border-blue-600 transition-all">
                <button onclick="establishConnection()" 
                        class="mt-4 w-full md:w-auto md:absolute md:right-2 md:top-2 bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-md font-medium transition-colors">
                    建立连接
                </button>
            </div>

            <div id="statusDisplay" class="hidden p-6 rounded-xl bg-slate-900/80 border border-blue-900/30">
                <div class="text-sm text-slate-500 mb-2 uppercase tracking-tighter">当前状态</div>
                <div id="output" class="text-lg font-mono text-blue-400"></div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-slate-700 text-xs tracking-widest">
        PROTOCOL V4.2 // SECURE TERMINAL
    </footer>

    <script>
        function establishConnection() {
            const input = document.getElementById('targetInput').value;
            const display = document.getElementById('statusDisplay');
            const output = document.getElementById('output');
            
            if(input) {
                display.classList.remove('hidden');
                output.innerHTML = "正在尝试连接至目标: " + input;
            }
        }
    </script>
</body>
</html>
